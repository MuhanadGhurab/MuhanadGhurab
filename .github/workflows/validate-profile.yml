name: Validate profile

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Required files exist
        run: |
          set -euo pipefail
          test -f README.md
          test -f LICENSE
          test -f data/profile-status.json
          test -f scripts/render-profile-assets.py
          test -f tests/test_profile_assets.py
          test -f assets/profile/cyber-crow-command-center.svg
          test -f assets/profile/cyber-crow-command-center-static.svg
          test -f assets/profile/crow-mark.svg
          test -f assets/profile/enterprise-orbit-diagram.svg
          test -f assets/profile/portfolio-telemetry.svg
          test -f assets/profile/security-status.svg
          test -f assets/profile/project-navigation.svg
          test -f docs/HERO-DESIGN-DECISION.md
          test -f docs/GITHUB-COMPATIBILITY.md
          test -f docs/BRAND-GUIDE.md
          test -f docs/PROFILE-CONTENT.md
          test -f resume/README.md

      - name: Run profile asset tests
        run: python tests/test_profile_assets.py

      - name: Secret pattern scan
        run: |
          set -euo pipefail
          python3 - <<'PY'
          from pathlib import Path
          import re
          patterns = [
              re.compile(r"AKIA[0-9A-Z]{16}"),
              re.compile(r"ghp_[A-Za-z0-9]{20,}"),
              re.compile(r"gho_[A-Za-z0-9]{20,}"),
              re.compile(r"xox[baprs]-[A-Za-z0-9-]{10,}"),
              re.compile(r"BEGIN (RSA|OPENSSH|EC) PRIVATE KEY"),
              re.compile(r"postgres(ql)?://[^\s]+:[^\s]+@"),
          ]
          skip = {".png", ".jpg", ".jpeg", ".gif", ".webp", ".pdf"}
          hits = []
          for path in Path(".").rglob("*"):
              if not path.is_file() or path.suffix.lower() in skip:
                  continue
              if ".git" in path.parts:
                  continue
              try:
                  text = path.read_text(encoding="utf-8", errors="ignore")
              except OSError:
                  continue
              for pat in patterns:
                  if pat.search(text):
                      hits.append(f"{path}: matched {pat.pattern}")
          if hits:
              print("\n".join(hits))
              raise SystemExit(1)
          print("secret pattern scan clean")
          PY

      - name: Accuracy and resume-link gates
        run: |
          set -euo pipefail
          grep -q "Muhanad Ghurab" README.md
          grep -q "IT Specialist — Tekfen Construction" README.md
          grep -q "In Progress" README.md
          grep -q "cyber-crow-command-center.svg" README.md
          grep -q "profile-status.json" README.md
          ! grep -qi "Security+ Certified" README.md
          ! grep -qi "Certified PMP" README.md
          ! grep -qi "Aramco Employee" README.md
          # Do not link ATS PDF until file exists
          if grep -E '\[[^\]]*\]\([^)]*Muhanad-Ghurab-ATS-Resume\.pdf\)' README.md; then
            test -f resume/Muhanad-Ghurab-ATS-Resume.pdf
          fi

      - name: Local asset references exist
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import re
          from pathlib import Path
          readme = Path("README.md").read_text(encoding="utf-8")
          refs = re.findall(r'\./(assets/[^)"\s]+)', readme)
          missing = [r for r in refs if not Path(r).exists()]
          if missing:
              raise SystemExit(f"missing assets: {missing}")
          print("asset refs ok", refs)
          PY

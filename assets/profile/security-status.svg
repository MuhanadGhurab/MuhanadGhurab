  <rect width="1100" height="160" rx="16" fill="#020617" stroke="#1E293B"/>
  <text x="40" y="40" font-family="IBM Plex Mono,Consolas,monospace" font-size="16" fill="#22D3EE">OPERATING STATUS</text>
  <g font-family="IBM Plex Mono,Consolas,monospace" font-size="13" fill="#CBD5E1">

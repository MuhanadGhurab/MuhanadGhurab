    <text x="60" y="90" fill="#FFFFFF">Docs validated</text>
    <text x="60" y="112" fill="#22D3EE">Profile CI green</text>
    <rect x="300" y="60" width="240" height="70" rx="10" fill="#0F172A" stroke="#22D3EE"/>

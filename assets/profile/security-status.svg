    <rect x="820" y="60" width="240" height="70" rx="10" fill="#0F172A" stroke="#475569"/>
    <text x="840" y="90" fill="#FFFFFF">Privacy boundary</text>
    <text x="840" y="112" fill="#22D3EE">Public-safe only</text>
